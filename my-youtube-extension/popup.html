<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recap</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0b;
      color: #fafafa;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
    }

    .page-info {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .page-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .page-url {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-type {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      padding: 3px 8px;
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
      border-radius: 4px;
      margin-top: 8px;
    }

    .transcript-status {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .transcript-status.success {
      color: #4ade80;
    }

    .transcript-status.warning {
      color: #fbbf24;
    }

    .save-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .save-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }

    .save-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .save-button.success {
      background: #22c55e;
    }

    .save-button.error {
      background: #ef4444;
    }

    .status-message {
      text-align: center;
      font-size: 12px;
      margin-top: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .status-message.error {
      color: #f87171;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .auth-section {
      text-align: center;
      padding: 20px;
    }

    .auth-section p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 16px;
    }

    .auth-button {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
      margin-bottom: 8px;
    }

    .auth-button:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .auth-status {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
    }

    .auth-status.authenticated {
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">R</div>
      <div class="title">Recap</div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
    </div>

    <div id="content" style="display: none;">
      <div class="page-info">
        <div id="pageTitle" class="page-title">Loading...</div>
        <div id="pageUrl" class="page-url"></div>
        <div id="pageType" class="page-type"></div>
        <div id="transcriptStatus" class="transcript-status" style="display: none;"></div>
      </div>

      <button id="saveButton" class="save-button">
        <span id="saveIcon">💾</span>
        <span id="saveText">Save & Summarize</span>
      </button>

      <div id="statusMessage" class="status-message"></div>
    </div>

    <div id="authSection" class="auth-section" style="display: none;">
      <p>Sign in to save pages to your Recap library</p>
      <button id="authButton" class="auth-button">Sign In with Recap</button>
      <div id="authStatus" class="auth-status"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
