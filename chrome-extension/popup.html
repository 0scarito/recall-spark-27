<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recap</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0b;
      color: #fafafa;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }

    .user-avatar {
      width: 20px;
      height: 20px;
      background: rgba(139, 92, 246, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }

    .logout-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      padding: 4px;
      font-size: 12px;
    }

    .logout-btn:hover {
      color: #f87171;
    }

    .page-info {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .page-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .page-url {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-type {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      padding: 3px 8px;
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
      border-radius: 4px;
      margin-top: 8px;
    }

    .transcript-status {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .transcript-status.success {
      color: #4ade80;
    }

    .transcript-status.warning {
      color: #fbbf24;
    }

    .save-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .save-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }

    .save-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .save-button.success {
      background: #22c55e;
    }

    .save-button.error {
      background: #ef4444;
    }

    .status-message {
      text-align: center;
      font-size: 12px;
      margin-top: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .status-message.error {
      color: #f87171;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Auth Section Styles */
    .auth-section {
      padding: 8px 0;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .auth-header h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .auth-header p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px;
      border-radius: 8px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: rgba(139, 92, 246, 0.3);
      color: white;
    }

    .auth-tab:hover:not(.active) {
      color: white;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: white;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #8b5cf6;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .auth-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .auth-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }

    .auth-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .auth-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .auth-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 16px 0;
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider span {
      padding: 0 12px;
    }

    .open-app-link {
      display: block;
      text-align: center;
      color: #a78bfa;
      font-size: 12px;
      text-decoration: none;
      cursor: pointer;
    }

    .open-app-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo">R</div>
        <div class="title">Recap</div>
      </div>
      <div id="userInfo" class="user-badge" style="display: none;">
        <div class="user-avatar">👤</div>
        <span id="userEmail"></span>
        <button id="logoutBtn" class="logout-btn" title="Sign out">✕</button>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
    </div>

    <div id="content" style="display: none;">
      <div class="page-info">
        <div id="pageTitle" class="page-title">Loading...</div>
        <div id="pageUrl" class="page-url"></div>
        <div id="pageType" class="page-type"></div>
        <div id="transcriptStatus" class="transcript-status" style="display: none;"></div>
      </div>

      <button id="saveButton" class="save-button">
        <span id="saveIcon">💾</span>
        <span id="saveText">Save & Summarize</span>
      </button>

      <div id="statusMessage" class="status-message"></div>
    </div>

    <div id="authSection" class="auth-section" style="display: none;">
      <div class="auth-header">
        <h2>Welcome to Recap</h2>
        <p>Sign in to save pages to your library</p>
      </div>

      <div class="auth-tabs">
        <button id="loginTab" class="auth-tab active">Sign In</button>
        <button id="signupTab" class="auth-tab">Sign Up</button>
      </div>

      <div id="authError" class="auth-error"></div>
      <div id="authSuccess" class="auth-success"></div>

      <form id="authForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" id="authSubmit" class="auth-submit">Sign In</button>
      </form>

      <div class="divider"><span>or</span></div>
      <a id="openAppLink" class="open-app-link">Open Recap App →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
